name: Build Registry and Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🚀 Run build and validation script
        run: python scripts/build_registry.py

      - name: 📝 Commit and Push changes
        if: github.event_name == 'push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add registry.json README.md
          
          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-update registry.json and README.md [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
